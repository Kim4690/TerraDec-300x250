<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0}
.banner{width:300px;height:250px;position:relative;overflow:hidden;font-family:Arial,sans-serif;cursor:pointer;background:#333}
.text{position:absolute;left:10px;color:#fff;font-weight:bold;opacity:0}
.t1{top:50px;font-size:24px;animation:t1 8s infinite;}
.t2{top:90px;font-size:24px;animation:t2 8s infinite;}
.line3{position:absolute;top:130px;left:10px;display:flex;gap:6px}
.med{font-size:24px;opacity:0;animation:med 8s infinite;}
.terra{font-size:28px;color:#e52521;opacity:0;transform:scale(3);animation:terra 8s infinite}
.logo{position:absolute;right:8px;bottom:8px;color:#e52521;font-weight:bold}
@keyframes t1{0%,10%{opacity:0}20%,100%{opacity:1}}
@keyframes t2{0%,30%{opacity:0}40%,100%{opacity:1}}
@keyframes med{0%,45%{opacity:0}55%,100%{opacity:1}}
@keyframes terra{0%,45%{opacity:0;transform:scale(3)}80%,100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="banner" onclick="window.open('https://www.fischerdanmark.dk/da/produkter/skruer/terradec/supplerende-tilbehor/559692-terradec-80-x-1-x-20000-mm','_blank')">
  <div class="text t1">Forlæng levetiden</div>
  <div class="text t2">på din terrasse</div>
  <div class="line3"><div class="med">med</div><div class="terra">TerraDec.</div></div>
  <div class="logo">fischer</div>
</div>
</body>
</html>
